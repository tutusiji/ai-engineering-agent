id: from-idea-to-app
name: From Idea To Application
version: 0.3.0
description: 新项目专用工作流 — 从想法到完整应用，先出架构方案再编码

input:
  schema: idea-input
  fields:
    - name: userMessage
      type: string
      required: true
    - name: conversationHistory
      type: array
      required: false
    - name: existingDocument
      type: object
      required: false
    - name: mode
      type: string
      required: false
      enum: [gather, refine, score, design, architecture, code]

nodes:
  - id: interactive_requirement
    type: agent
    name: 交互式需求收集
    skill: interactive-requirement
    outputSchema: requirement-spec

  - id: target_profile_selection
    type: agent
    name: 全栈 Profile 选择
    skill: target-profile-selection
    dependsOn:
      - interactive_requirement
    outputSchema: target-profile-selection

  # ─── Phase: 架构设计 ───
  - id: architecture_planning
    type: agent
    name: 架构方案设计
    skill: architecture-planning
    dependsOn:
      - target_profile_selection
    outputSchema: architecture-design

  # ─── Phase: 可交互预览 ───
  - id: design_generation
    type: agent
    name: 可交互预览生成
    skill: design-generation
    dependsOn:
      - architecture_planning
    when:
      allPassed: true
    outputSchema: generation-report

  # ─── Phase: 代码生成（在架构方案审批后） ───
  - id: code_generation
    type: agent
    name: 代码生成
    skill: code-generation
    dependsOn:
      - design_generation
    when:
      allPassed: true
    outputSchema: generation-report
    retryTarget: architecture_planning
    maxRetries: 2

output:
  primaryFrom: code_generation

approvalGates:
  - afterStage: architecture_planning
    name: 架构方案审批
    required: true
    description: 确认架构设计方向后再进入编码阶段
