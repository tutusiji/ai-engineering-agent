id: vue3-admin
status: legacy
platform: admin-web
framework: vue3
uiLibrary: element-plus
routingMode: vue-router
styling:
  - tailwindcss
  - unocss
pagePatterns:
  supports:
    - route-page
    - drawer
    - modal
    - tab-page
preferredPlugins:
  scanner: vue3-project-scanner
  navigation: route-menu-decider
  generator: crud-page-generator
validation:
  visualRegression: true
  playwright: true

backend:
  framework: nestjs
  language: typescript
  orm: prisma
  patterns: [crud, auth, upload, export, pagination]
  testing: [jest, supertest]

database:
  strategy: auto-recommend
  candidates: [postgresql, sqlite]
  migration: auto

deployment:
  strategy: docker-compose
  components: [nginx, api, db]
