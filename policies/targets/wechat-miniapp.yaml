id: wechat-miniapp
platform: miniapp
framework: native-miniapp
uiLibrary: native
routingMode: miniapp-pages
styling:
  - wxss
pagePatterns:
  supports:
    - miniapp-page
validation:
  visualRegression: limited
  playwright: false

backend:
  framework: nestjs
  language: typescript
  orm: prisma
  patterns: [crud, auth, upload, export, pagination]
  testing: [jest, supertest]

database:
  strategy: auto-recommend
  candidates: [postgresql, sqlite]
  migration: auto

deployment:
  strategy: docker-compose
  components: [nginx, api, db]
