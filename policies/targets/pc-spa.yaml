id: pc-spa
status: legacy
platform: pc-spa
framework: unknown
uiLibrary: custom
routingMode: custom
styling:
  - custom
pagePatterns:
  supports:
    - route-page
    - standalone-page
    - modal
validation:
  visualRegression: true
  playwright: true

backend:
  framework: nestjs
  language: typescript
  orm: prisma
  patterns: [crud, auth, upload, export, pagination]
  testing: [jest, supertest]

database:
  strategy: auto-recommend
  candidates: [postgresql, sqlite]
  migration: auto

deployment:
  strategy: docker-compose
  components: [nginx, api, db]
