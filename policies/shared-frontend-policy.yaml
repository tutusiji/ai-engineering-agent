# Shared interaction policies applicable to all target profiles (fullstack and frontend)
interaction:
  loading:
    required: true
  dangerousAction:
    requireConfirm: true
  query:
    debounceMs: 300
    cancelPreviousRequest: true
  submit:
    disableWhilePending: true

review:
  requireStructuredContracts: true
  requireValidationBeforeCompletion: true
