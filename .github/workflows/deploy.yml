name: Deploy to Server

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: 'main'

jobs:
  build-and-deploy:
    name: 🚀 Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}

      - name: 📦 Setup Node & pnpm
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build frontend
        run: pnpm --filter @ai-engineering-agent/studio-web build

      - name: 🧪 Run backend tests
        run: pnpm --filter @ai-engineering-agent/studio-api test run

      - name: 🔑 Setup SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          config: |
            Host deploy-server
              HostName ${{ secrets.SSH_HOST }}
              User ${{ secrets.SSH_USER }}
              Port ${{ secrets.SSH_PORT || 22 }}
              ServerAliveInterval 15
              ServerAliveCountMax 4

      - name: 📤 Deploy to server
        run: |
          BRANCH="${{ github.event.inputs.branch || 'main' }}"

          echo "📤 Syncing frontend dist..."
          rsync -avz --delete \
            apps/studio-web/dist/ \
            deploy-server:/root/projects/ai-engineering-agent/apps/studio-web/dist/

          echo "📥 Updating server code..."
          ssh deploy-server "bash -s" << 'SERVER_SCRIPT'
            set -e
            cd /root/projects/ai-engineering-agent

            # Preserve local environment and runtime data
            if [ -f .env ]; then
              cp .env .env.deploy-backup
            fi

            # Pull latest code
            git fetch origin
            git checkout ${{ github.event.inputs.branch || 'main' }}
            git reset --hard origin/${{ github.event.inputs.branch || 'main' }}

            # Restore local environment
            if [ -f .env.deploy-backup ]; then
              mv .env.deploy-backup .env
            fi

            # Install backend deps only (frontend dist already synced)
            pnpm install --frozen-lockfile --filter !@ai-engineering-agent/studio-web

            echo "🔄 Restarting via PM2..."
            pm2 startOrReload ecosystem.config.cjs --update-env

            echo "⏳ Waiting for services..."
            sleep 3

            echo "🏥 Running health check..."
            MAX_RETRIES=10
            RETRY_COUNT=0
            HEALTH_OK=false
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -sf http://localhost:4401/api/health >/dev/null 2>&1; then
                HEALTH_OK=true
                break
              fi
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "Health check attempt $RETRY_COUNT/$MAX_RETRIES failed, retrying..."
              sleep 2
            done

            if [ "$HEALTH_OK" = "false" ]; then
              echo "❌ Health check failed after $MAX_RETRIES attempts"
              echo "🔄 Rolling back to previous git state..."
              git reset --hard HEAD@{1}
              pm2 startOrReload ecosystem.config.cjs --update-env
              exit 1
            fi

            echo "✅ Deploy complete!"
            pm2 status
          SERVER_SCRIPT

      - name: 🔔 Summary
        if: always()
        run: |
          echo "## 🚀 Deploy Result" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.event.inputs.branch || 'main' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${GITHUB_SHA:0:7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
