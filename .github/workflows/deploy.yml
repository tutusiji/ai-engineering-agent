name: Deploy to Server

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: 'main'

jobs:
  build-and-deploy:
    name: 🚀 Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}

      - name: 📦 Setup Node & pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build frontend
        run: pnpm --filter @ai-frontend-engineering-agent/studio-web build

      - name: 🔑 Setup SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          config: |
            Host deploy-server
              HostName ${{ secrets.SSH_HOST }}
              User ${{ secrets.SSH_USER }}
              Port ${{ secrets.SSH_PORT || 22 }}
              ServerAliveInterval 15
              ServerAliveCountMax 4

      - name: 📤 Deploy to server
        run: |
          BRANCH="${{ github.event.inputs.branch || 'main' }}"

          echo "📤 Syncing frontend dist..."
          rsync -avz --delete \
            apps/studio-web/dist/ \
            deploy-server:/root/projects/ai-frontend-engineering-agent/apps/studio-web/dist/

          echo "📥 Updating server code..."
          ssh deploy-server "bash -s" << 'SERVER_SCRIPT'
            set -e
            cd /root/projects/ai-frontend-engineering-agent

            # Clean any leftover local changes
            git checkout -- .
            git clean -fd

            # Pull latest code
            git fetch origin
            git checkout ${{ github.event.inputs.branch || 'main' }}
            git reset --hard origin/${{ github.event.inputs.branch || 'main' }}

            # Install backend deps only (frontend dist already synced)
            pnpm install --frozen-lockfile --filter !@ai-frontend-engineering-agent/studio-web

            echo "🔄 Restarting via PM2..."
            pm2 reload ecosystem.config.cjs --update-env 2>/dev/null || \
            pm2 restart ecosystem.config.cjs --update-env 2>/dev/null || \
            pm2 start ecosystem.config.cjs

            sleep 3
            echo "✅ Deploy complete!"
            pm2 status
          SERVER_SCRIPT

      - name: 🔔 Summary
        if: always()
        run: |
          echo "## 🚀 Deploy Result" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.event.inputs.branch || 'main' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${GITHUB_SHA:0:7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
